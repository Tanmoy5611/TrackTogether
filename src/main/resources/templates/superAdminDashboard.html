<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en" >
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <th:block th:replace="~{fragments/style :: appStyles}"></th:block>
</head>
<body class="kdg-page">
<div class="kdg-shell">
  <header th:replace="~{fragments/nav :: appNav}"></header>
  <main class="kdg-main">

    <section class="kdg-card">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h1 class="h3 fw-bold mb-1">Admin Dashboard</h1>
          <p class="text-muted mb-0">
            Manage activities, analytics, and reports from one place.
          </p>
        </div>
      </div>

      <div class="row g-4">

        <!-- Users -->
        <div class="col-12 col-md-6 col-xl-3" sec:authorize="hasRole('SUPER_ADMIN')">
          <a th:href="@{/super_admin/user}" class="dashboard-tile">
            <div class="dashboard-tile-icon text-primary">
              <i class="bi bi-people-fill"></i>
            </div>
            <div>
              <h2>Users</h2>
              <p>Manage users and roles</p>
            </div>
          </a>
        </div>

        <!-- Activities -->
        <div class="col-12 col-md-6 col-xl-3">
          <a th:href="@{/super_admin/activities}" class="dashboard-tile">
            <div class="dashboard-tile-icon text-info">
              <i class="bi bi-calendar-event-fill"></i>
            </div>
            <div>
              <h2>Activities</h2>
              <p>View platform activities</p>
            </div>
          </a>
        </div>

        <!-- Analytics -->
        <div class="col-12 col-md-6 col-xl-3">
          <a th:href="@{/analytics/dashboard}" class="dashboard-tile">
            <div class="dashboard-tile-icon text-success">
              <i class="bi bi-bar-chart-fill"></i>
            </div>
            <div>
              <h2>Analytics Reports</h2>
              <p>View usage, travel modes, and CO2 savings</p>
            </div>
          </a>
        </div>

        <!-- Reports -->
        <div class="col-12 col-md-6 col-xl-3">
          <a th:href="@{/moderator}" class="dashboard-tile">
            <div class="dashboard-tile-icon text-danger">
              <i class="bi bi-exclamation-triangle-fill"></i>
            </div>
            <div>
              <h2>Moderation Reports</h2>
              <p>Review reported content</p>
            </div>
          </a>
        </div>

        <!-- System Settings -->
        <div class="col-12 col-md-6 col-xl-3" sec:authorize="hasRole('SUPER_ADMIN')">
          <a th:href="@{/super_admin/settings}" class="dashboard-tile">
            <div class="dashboard-tile-icon dashboard-tile-icon--settings">
              <i class="bi bi-sliders"></i>
            </div>
            <div>
              <h2>System Settings</h2>
              <p>Manage platform behavior</p>
            </div>
          </a>
        </div>
      </div>
    </section>

  </main>  <footer th:replace="~{fragments/footer :: appFooter}"></footer>

</div>
</body>
</html>
