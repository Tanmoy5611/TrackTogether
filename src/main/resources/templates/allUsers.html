<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:lang="${currentLanguage}">
<head>
    <title>[[#{html.all.users}]]</title>
    <th:block th:replace="~{fragments/style :: appStyles}"></th:block>
    <script th:src="@{/js/users.js}" defer></script>
</head>
<body class="kdg-page">
<div class="kdg-shell">
    <header th:replace="~{fragments/nav :: appNav}"></header>
<main class="kdg-main">
    <h1>[[#{html.all.users}]]</h1>

    <div class="d-flex gap-2 mb-3">
        <input type="text"
               id="search"
               class="form-control w-25"
               placeholder="Search by name" th:placeholder="#{html.search.by.name}"
               aria-label="Search by name" th:aria-label="#{html.search.by.name}">

        <select id="roleFilter" class="form-select w-25" aria-label="Filter by role" th:aria-label="#{html.all.roles}">
            <option value="">[[#{html.all.roles}]]</option>
            <option value="MEMBER">[[#{html.member}]]</option>
            <option value="MODERATOR">[[#{html.moderator}]]</option>
            <option value="ADMIN">[[#{html.admin}]]</option>
            <option value="SUPER_ADMIN">[[#{html.super.admin}]]</option>
        </select>
    </div>

    <table class="table table-striped table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>[[#{html.name}]]</th>
            <th>[[#{html.email}]]</th>
            <th>[[#{html.status}]]</th>
            <th>[[#{html.role}]]</th>
        </tr>
        </thead>

        <tbody id="userTable">
        <tr th:each="user : ${users}"
            th:data-user-href="@{/super_admin/user/{id}(id=${user.id})}"
            style="cursor: pointer;">

            <td th:text="${user.name}">name</td>
            <td th:text="${user.email}">email</td>
            <td th:text="${#messages.msg('userStatus.' + user.status)}">status</td>
            <td th:text="${#messages.msg('role.' + user.role)}">role</td>

        </tr>
        </tbody>
    </table>

</main>
    <footer th:replace="~{fragments/footer :: appFooter}"></footer>
</div>
</body>
</html>
