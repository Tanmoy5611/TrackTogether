<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Settings</title>
    <th:block th:replace="~{fragments/style :: appStyles}"></th:block>
</head>
<body class="kdg-page">
<div class="kdg-shell">
    <header th:replace="~{fragments/nav :: appNav}"></header>

    <main class="kdg-main">
        <nav class="kdg-breadcrumb" aria-label="Breadcrumb">
            <a th:href="@{/}">
                <i class="bi bi-house-door" aria-hidden="true"></i>
                Home
            </a>
            <span>&gt;</span>
            <a th:href="@{/admin/dashboard}">Admin Dashboard</a>
            <span>&gt;</span>
            <span>System Settings</span>
        </nav>

        <section class="kdg-page-header">
            <div>
                <p class="kdg-eyebrow">Superadmin</p>
                <h1 class="kdg-title">System Settings</h1>
            </div>
        </section>

        <section class="kdg-panel system-settings-panel">
            <div class="system-setting"
                 th:classappend="${settings.travelGroupJoinApprovalEnabled} ? ' is-enabled' : ''">
                <div class="system-setting__icon">
                    <i class="bi bi-people" aria-hidden="true"></i>
                </div>

                <div class="system-setting__body">
                    <p class="kdg-eyebrow">Travel Groups</p>
                    <h2>Require approval before joining</h2>
                    <p>Turn this on when group creators should approve students before they join.</p>

                    <span class="system-setting__status"
                          th:classappend="${settings.travelGroupJoinApprovalEnabled} ? ' is-on' : ' is-off'">
                        <i class="bi"
                           th:classappend="${settings.travelGroupJoinApprovalEnabled} ? ' bi-check-circle' : ' bi-lightning-charge'"
                           aria-hidden="true"></i>
                        <span th:text="${settings.travelGroupJoinApprovalEnabled ? 'Approval mode' : 'Direct join'}">
                            Direct join
                        </span>
                    </span>
                </div>

                <form class="system-setting__form"
                      th:action="@{/super_admin/settings/travelgroup-approval}"
                      method="post">
                    <!-- Submit the opposite value so the pill behaves like a simple toggle. -->
                    <input type="hidden"
                           name="enabled"
                           th:value="${!settings.travelGroupJoinApprovalEnabled}">
                    <button type="submit"
                            class="system-setting-toggle"
                            th:classappend="${settings.travelGroupJoinApprovalEnabled} ? ' is-on' : ''"
                            th:attr="aria-pressed=${settings.travelGroupJoinApprovalEnabled}">
                        <span class="system-setting-toggle__track">
                            <span class="system-setting-toggle__thumb"></span>
                        </span>
                        <span th:text="${settings.travelGroupJoinApprovalEnabled ? 'On' : 'Off'}">Off</span>
                    </button>
                </form>
            </div>
        </section>
    </main>

    <footer th:replace="~{fragments/footer :: appFooter}"></footer>
</div>
</body>
</html>
