<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet"
          href="../../static/css/main.css"
          th:href="@{/css/main.css}">
</head>
<body>
<header th:fragment="appNav">
    <nav class="kdg-nav" aria-label="Main navigation">
        <div class="kdg-nav__inner">

            <a class="kdg-brand"
               href="../index.html"
               th:href="@{/}">
                <img class="kdg-brand__logo"
                     src="../../static/images/logo.png"
                     th:src="@{/images/logo.png}"
                     alt="TrackTogether">
            </a>

            <button class="kdg-nav__toggle"
                    type="button"
                    aria-expanded="false"
                    aria-controls="primary-navigation"
                    aria-label="Toggle navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <ul class="kdg-nav__links"
                id="primary-navigation">

                <li th:if="${showDashboardNav}">
                    <a class="kdg-nav__link"
                       data-nav-item="dashboard"
                       href="../superAdminDashboard.html"
                       th:href="@{/super_admin/home}">
                        Dashboard
                    </a>
                </li>

                <li>
                    <a class="kdg-nav__link"
                       data-nav-item="home"
                       href="../index.html"
                       th:href="@{/}">
                        Home
                    </a>
                </li>

                <!-- ✅ ACTIVITIES ADDED HERE -->
                <li>
                    <a class="kdg-nav__link"
                       data-nav-item="activities"
                       href="../activities.html"
                       th:href="@{/activities}">
                        Activities
                    </a>
                </li>

                <li>
                    <a class="kdg-nav__link"
                       data-nav-item="travelgroups"
                       href="../travelgroups.html"
                       th:href="@{/travelgroups}">
                        Travel Groups
                    </a>
                </li>

                <li>
                    <a class="kdg-nav__link"
                       data-nav-item="chats"
                       href="../chat-overview.html"
                       th:href="@{/chat}">
                        Chats
                    </a>
                </li>

                <li>
                    <a class="kdg-nav__link"
                       data-nav-item="moderation"
                       href="../moderator.html"
                       th:href="@{/moderator}">
                        Moderation
                    </a>
                </li>

                <li>
                    <a class="kdg-enrol"
                       data-nav-item="profile"
                       href="../userOverview.html"
                       th:href="@{/member/profile}">
                        Profile
                    </a>
                </li>

            </ul>
        </div>
    </nav>

    <div class="toast-container position-fixed top-0 end-0 p-3 kdg-toast-container"
         th:if="${toastMessage != null}">
        <div id="flashToast"
             class="toast kdg-toast"
             th:classappend="${toastType == 'success'} ? ' kdg-toast--success' : (${toastType == 'danger'} ? ' kdg-toast--danger' : ' kdg-toast--info')"
             role="status"
             aria-live="polite"
             aria-atomic="true"
             data-bs-delay="3200">
            <div class="toast-body">
                <i class="bi"
                   th:classappend="${toastType == 'success'} ? ' bi-check-circle' : (${toastType == 'danger'} ? ' bi-exclamation-triangle' : ' bi-info-circle')"
                   aria-hidden="true"></i>
                <span th:text="${toastMessage}">Request sent.</span>
            </div>
        </div>
    </div>

    <script type="module"
            th:src="@{/js/main.js}">
    </script>
</header>
</body>
</html>
