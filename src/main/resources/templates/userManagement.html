<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:lang="${currentLanguage}">
<head>
    <title>[[#{html.user.overview}]]</title>
    <th:block th:replace="~{fragments/style :: appStyles}"></th:block>

    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <script th:src="@{/js/user-detail.js}" defer></script>

</head>

<body class="kdg-page">
<div class="kdg-shell">

    <header th:replace="~{fragments/nav :: appNav}"></header>

    <main class="kdg-main container mt-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">[[#{html.user.overview}]]</h2>

            <a th:href="@{/super_admin/user}" class="btn btn-outline-secondary">
                [[#{html.back.to.users}]]
            </a>
        </div>

        <div id="userManagementError"
             class="alert alert-danger d-none"
             role="alert"
             aria-live="polite"></div>

        <div class="card shadow-sm">
            <div class="card-body">

                <div class="row mb-3">
                    <div class="col-sm-3 fw-bold">[[#{html.id}]]</div>
                    <div class="col-sm-9" th:text="${user.id}"></div>
                </div>

                <div class="row mb-3">
                    <div class="col-sm-3 fw-bold">[[#{html.name}]]</div>
                    <div class="col-sm-9" th:text="${user.name}"></div>
                </div>

                <div class="row mb-3">
                    <div class="col-sm-3 fw-bold">[[#{html.email}]]</div>
                    <div class="col-sm-9" th:text="${user.email}"></div>
                </div>

                <div class="row mb-3">
                    <div class="col-sm-3 fw-bold">[[#{html.status}]]</div>
                    <div class="col-sm-9">
                        <label for="statusSelect" class="visually-hidden">[[#{html.status}]]</label>
                        <select id="statusSelect" class="form-select">
                            <option value="true" th:selected="${user.status}">[[#{html.active}]]</option>
                            <option value="false" th:selected="${!user.status}">[[#{html.inactive}]]</option>
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-sm-3 fw-bold">[[#{html.role}]]</div>
                    <div class="col-sm-9">
                        <label for="roleSelect" class="visually-hidden">[[#{html.role}]]</label>
                        <select id="roleSelect"
                                class="form-select"
                                th:data-last-super-admin="${lastSuperAdmin}">
                            <option value="MEMBER" th:selected="${user.role == 'MEMBER'}">[[#{html.member}]]</option>
                            <option value="MODERATOR" th:selected="${user.role == 'MODERATOR'}">[[#{html.moderator}]]</option>
                            <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">[[#{html.admin}]]</option>
                            <option value="SUPER_ADMIN" th:selected="${user.role == 'SUPER_ADMIN'}">[[#{html.super.admin}]]</option>
                        </select>
                    </div>
                </div>

                <!-- Hidden ID -->
                <input type="hidden" id="userId" th:value="${user.id}">

            </div>
        </div>
        <!-- Confirm Modal -->
        <div class="modal fade" id="confirmModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">

                    <div class="modal-header">
                        <h5 class="modal-title">[[#{html.confirm.change}]]</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">
                        <p id="confirmMessage">[[#{html.are.you.sure}]]</p>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                            [[#{html.cancel}]]
                        </button>
                        <button type="button" class="btn btn-primary" id="confirmBtn">
                            [[#{html.confirm}]]
                        </button>
                    </div>

                </div>
            </div>
        </div>

    </main>

    <footer th:replace="~{fragments/footer :: appFooter}"></footer>

</div>

</body>
</html>
