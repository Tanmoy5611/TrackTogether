name: TrackTogether CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build backend
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build boot jar
        run: ./gradlew clean bootJar

      - name: Upload boot jar
        uses: actions/upload-artifact@v4
        with:
          name: tracktogether-jar
          path: build/libs/*.jar
          if-no-files-found: error

  test:
    name: Test backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.1-alpine
        env:
          POSTGRES_DB: tracktogether_ci
          POSTGRES_USER: tracktogether_ci
          POSTGRES_PASSWORD: tracktogether_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tracktogether_ci -d tracktogether_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/tracktogether_ci
      SPRING_DATASOURCE_USERNAME: tracktogether_ci
      SPRING_DATASOURCE_PASSWORD: tracktogether_ci_password
      DB_USERNAME: tracktogether_ci
      DB_PASSWORD: tracktogether_ci_password
      GOOGLE_CLIENT_ID: test-client-id
      GOOGLE_CLIENT_SECRET: test-client-secret
      DELIJN_API_KEY: ""
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test

      - name: Publish JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: build/test-results/test/*.xml

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    if: ${{ hashFiles('Dockerfile') != '' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t tracktogether-backend:ci .
